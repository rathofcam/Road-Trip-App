<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Trip App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #1a1a1a; color: #fdfdff; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .page { border: 4px solid #ffcc00; padding: 25px; background: #262635; width: 350px; text-align: center; margin-bottom: 20px; box-shadow: 10px 10px 0px #000; }
        .hidden { display: none; }
        button { background: #ff5e5e; border: 2px solid #fff; padding: 10px; cursor: pointer; color: #fff; font-weight: bold; margin: 5px; width: 45%; }
        button:hover { background: #ff9999; }
        .red-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .red-btn { background: #8b0000; border: 2px solid #ff0000; width: 100%; transition: 0.2s; }
        .red-btn:hover { background: #ff0000; transform: scale(0.95); }
        #bigOne { transition: font-size 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: inline-block; color: #00f2ff; }
        .liminal-frame { width: 100%; height: 200px; background: #050505; margin: 15px 0; display: flex; align-items: center; justify-content: center; border: 2px dashed #00f2ff; position: relative; }
        .flicker { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #voidLog { background: #000; color: #00ff41; padding: 10px; font-size: 0.8em; text-align: left; height: 60px; overflow-y: auto; margin-top: 10px; border: 1px solid #00ff41; }
    </style>
</head>
<body>

<div id="page1" class="page">
    <h1>CONTROL PANEL</h1>
    <div id="numberDisplay" style="font-size: 3em; color: #ff5e5e;">1</div>
    <input type="range" min="1" max="100" value="1" oninput="document.getElementById('numberDisplay').textContent = this.value">
    <br>
    <button onclick="showPage('page2')">VISUAL</button>
    <button onclick="showPage('page3')">LIMINAL</button>
    <button onclick="showPage('page4')">VOID LOG</button>
    <button onclick="showPage('page5')">DANGER</button>
</div>

<div id="page2" class="page hidden">
    <h1>SCALING</h1>
    <div style="height: 150px; display: flex; align-items: center; justify-content: center;">
        <span id="bigOne" style="font-size: 20px;">1</span>
    </div>
    <input type="range" min="1" max="10" value="1" oninput="resizeOne(this.value)">
    <br>
    <button onclick="showPage('page1')">BACK</button>
</div>

<div id="page3" class="page hidden">
    <h1>LIMINAL VIEWER</h1>
    <div class="liminal-frame"><span id="imgName" class="flicker">liminal1.png</span></div>
    <input type="range" min="1" max="5" value="1" oninput="changeImg(this.value)">
    <br>
    <button onclick="showPage('page1')">BACK</button>
</div>

<div id="page4" class="page hidden">
    <h1>VOID LOG</h1>
    <div id="voidLog">SYSTEM: Ready...<br>LOG: Travelling...</div>
    <br>
    <button onclick="addLog()">ADD LOG</button>
    <button onclick="showPage('page1')">BACK</button>
</div>

<div id="page5" class="page hidden">
    <h1 style="color: #ff0000;">CORRUPTION</h1>
    <div class="red-container">
        <button class="red-btn" onclick="corrupt()">BOOP</button>
        <button class="red-btn" onclick="corrupt()">BOOP</button>
        <button class="red-btn" onclick="corrupt()">BOOP</button>
        <button class="red-btn" onclick="corrupt()">BOOP</button>
        <button class="red-btn" onclick="corrupt()">BOOP</button>
        <button class="red-btn" onclick="corrupt()">BOOP</button>
    </div>
    <br>
    <button style="width: 100%;" onclick="showPage('page1')">ESCAPE</button>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(() => console.log('Service Worker Registered!'));
    }
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(pageId).classList.remove('hidden');
    }
    function resizeOne(val) { document.getElementById('bigOne').style.fontSize = (20 * val) + "px"; }
    function changeImg(val) { document.getElementById('imgName').textContent = "liminal" + val + ".png"; }
    function addLog() {
        const log = document.getElementById('voidLog');
        log.innerHTML += "<br>LOG: Glitch detected...";
        log.scrollTop = log.scrollHeight;
    }
    function corrupt() {
        document.body.style.filter = "invert(1) hue-rotate(90deg)";
        setTimeout(() => { document.body.style.filter = "none"; }, 200);
        alert("SYSTEM ERROR: 404 REALITY NOT FOUND");
    }
</script>
</body>
</html>
